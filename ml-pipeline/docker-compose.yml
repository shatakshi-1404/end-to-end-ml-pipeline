version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./mlruns:/app/mlruns
      - ./models:/app/models
      - ./data:/app/data
    environment:
      - MLFLOW_TRACKING_URI=file:./mlruns
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

  mlflow:
    image: python:3.11-slim
    working_dir: /mlruns
    volumes:
      - ./mlruns:/mlruns
    ports:
      - "5001:5001"
    command: >
      sh -c "pip install mlflow -q &&
             mlflow ui --host 0.0.0.0 --port 5001 --backend-store-uri file:/mlruns"
    restart: unless-stopped